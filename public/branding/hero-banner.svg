<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 760" role="img" aria-labelledby="title desc">
  <title id="title">Areshnaat campaign banner</title>
  <desc id="desc">Vertical ornamental banner in green, gold, and parchment for the World of Areshnaat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3d29"/>
      <stop offset="52%" stop-color="#174e33"/>
      <stop offset="100%" stop-color="#0e3524"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4dfa2"/>
      <stop offset="45%" stop-color="#d6ae57"/>
      <stop offset="100%" stop-color="#8d6420"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="224" height="744" rx="10" fill="url(#bg)" stroke="#8d6420" stroke-width="3"/>
  <rect x="18" y="18" width="204" height="724" rx="7" fill="none" stroke="#d6ae57" stroke-width="1.5" opacity="0.8"/>
  <path d="M120 54 L168 108 L120 162 L72 108 Z" fill="#131313" stroke="url(#gold)" stroke-width="9" filter="url(#shadow)"/>
  <circle cx="120" cy="108" r="84" fill="none" stroke="url(#gold)" stroke-width="10" opacity="0.95"/>
  <circle cx="120" cy="108" r="97" fill="none" stroke="#f4dfa2" stroke-width="1.5" opacity="0.75"/>
  <path d="M62 258 C92 236, 148 236, 178 258" fill="none" stroke="#d6ae57" stroke-width="3" opacity="0.8"/>
  <path d="M54 288 H186" stroke="#d6ae57" stroke-width="1.5" opacity="0.7"/>
  <path d="M54 530 H186" stroke="#d6ae57" stroke-width="1.5" opacity="0.7"/>
  <text x="120" y="344" text-anchor="middle" fill="#f4dfa2" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="5">THE WORLD</text>
  <text x="120" y="388" text-anchor="middle" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="2">ARESHNAAT</text>
  <text x="120" y="428" text-anchor="middle" fill="#f4dfa2" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="4">ATLAS AND ARCHIVE</text>
  <path d="M72 576 C92 606, 148 606, 168 576" fill="none" stroke="#d6ae57" stroke-width="3" opacity="0.8"/>
  <path d="M58 642 L182 642" stroke="#d6ae57" stroke-width="1.5" opacity="0.6"/>
  <path d="M70 672 L170 672" stroke="#d6ae57" stroke-width="1" opacity="0.45"/>
  <circle cx="120" cy="704" r="18" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <circle cx="120" cy="704" r="6" fill="#f4dfa2"/>
</svg>
